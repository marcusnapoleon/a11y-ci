name: Accessibility Pipeline

permissions:
  pull-requests: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: |
          
          npm install -g htmlhint stylelint stylelint-config-standard
          npm install -g eslint eslint-plugin-jsx-a11y globals

      - name: Lint HTML/CSS (remediation stages)
        run: |
          echo "=== Linting Lint-30 ==="
          htmlhint "LINT-30/**/*.html"
          stylelint "LINT-30/**/*.css"

          echo "=== Linting Lint-75 ==="
          htmlhint "LINT-75/**/*.html"
          stylelint "LINT-75/**/*.css"

          echo "=== Linting WCAG-20 ==="
          htmlhint "WCAG-20/**/*.html"
          stylelint "WCAG-20/**/*.css"

          echo "=== Linting WCAG-21 ==="
          htmlhint "WCAG-21/**/*.html"
          stylelint "WCAG-21/**/*.css"

          echo "=== Linting Accessible ==="
          htmlhint "Accessible/**/*.html"
          stylelint "Accessible/**/*.css"

          echo "=== Linting Components ==="
          htmlhint "Components/**/*.html"
          stylelint "Components/**/*.css"

      - name: Lint JavaScript (ESLint)
        run: |
          if find Components -name "*.js" 2>/dev/null | grep -q .; then
            echo "=== Linting JavaScript ==="
            eslint "Components/**/*.js" --max-warnings=0
          else
            echo "No JavaScript files found — skipping ESLint"
          fi

  axe:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install serve, axe-core, and browser-driver-manager
        run: |
          npm install -g serve
          npm install -g @axe-core/cli
          npm install -g browser-driver-manager

      - name: Install matching ChromeDriver
        run: npx browser-driver-manager install chrome

      - name: Run axe on progression versions and components
        run: |
          npx serve . -p 8080 &
          sleep 5

          echo "=== Testing WCAG-20 ==="
          npx axe http://localhost:8080/WCAG-20/index.html --exit
          
          echo "=== Testing WCAG-21 ==="
          npx axe http://localhost:8080/WCAG-21/index.html --exit

          echo "=== Testing Accessible (WCAG 2.2) ==="
          npx axe http://localhost:8080/Accessible/index.html --exit

          echo "=== Testing Components ==="
          for component in accordion tabs modal photo-viewer slider; do
            if [ -d "Components/$component" ]; then
              echo "Testing $component..."
              npx axe http://localhost:8080/Components/$component/index.html --exit
            fi
          done

          kill $(lsof -t -i:8080) || true

  lighthouse:
    runs-on: ubuntu-latest
    needs: axe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install serve and Lighthouse
        run: |
          npm install -g serve
          npm install -g lighthouse

      - name: Run Lighthouse on Accessible version
        id: lighthouse
        run: |
          npx serve . -p 8080 &
          sleep 5
          
          npx lighthouse http://localhost:8080/Accessible/index.html \
            --output json \
            --output-path lh.json \
            --chrome-flags="--headless" || true
          
          echo "PERFORMANCE=$(jq '.categories.performance.score * 100 | floor' lh.json)" >> $GITHUB_OUTPUT
          echo "ACCESSIBILITY=$(jq '.categories.accessibility.score * 100 | floor' lh.json)" >> $GITHUB_OUTPUT
          echo "BEST_PRACTICES=$(jq '.categories["best-practices"].score * 100 | floor' lh.json)" >> $GITHUB_OUTPUT
          echo "SEO=$(jq '.categories.seo.score * 100 | floor' lh.json)" >> $GITHUB_OUTPUT
          
          kill $(lsof -t -i:8080) || true

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lh.json

      - name: Post PR Comment
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const perf = ${{ steps.lighthouse.outputs.PERFORMANCE }};
            const acc = ${{ steps.lighthouse.outputs.ACCESSIBILITY }};
            const bp = ${{ steps.lighthouse.outputs.BEST_PRACTICES }};
            const seo = ${{ steps.lighthouse.outputs.SEO }};
            
            const comment = `## 📊 Lighthouse Scores
            | Metric | Score |
            |--------|-------|
            | Performance | ${perf}/100 |
            | Accessibility | ${acc}/100 |
            | Best Practices | ${bp}/100 |
            | SEO | ${seo}/100 |
            
            ### ✅ Accessibility Checks
            - HTML Lint: Passed
            - CSS Lint: Passed
            - JavaScript Lint: Passed (ESLint)
            - WCAG 2.0 AA: Passed
            - WCAG 2.1 AA: Passed
            - WCAG 2.2 AA: Passed
            - Accessible Components: Passed
            
            ### 📄 Full Report
            To download the complete Lighthouse report:
            1. Go to the **Actions** tab above
            2. Click on this workflow run
            3. Download **lighthouse-report** from the **Artifacts** section
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
