<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Survey Form – WCAG 2.1 AA</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto|Poiret+One">
    <style>
        /* ===== BASE + WCAG 2.0 FIXES (preserved) ===== */
        *, *:before, *:after { box-sizing: inherit; }
        html, body {
            box-sizing: border-box;
            color: #000;
            background: linear-gradient(to top left, #99ff99 0%, #0066cc 100%);
            text-align: center;
            font-family: "Roboto", Helvetica, sans-serif;
            font-size: 1em;
        }
        #title {
            font-family: "Poiret One", cursive;
            color: white;
            font-size: 2.5em;
            margin-top: 25px;
        }
        #description {
            width: 80%;
            margin: 0 auto;
            font-family: "Poiret One", cursive;
            color: white;
        }
        #survey-form {
            max-width: 800px;
            margin: 30px auto 50px;
            background-color: ghostwhite;
            border-radius: 5px;
            padding: 30px 20px 20px;
        }
        .rowTab {
            margin-bottom: 1em;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .labels {
            width: 40%;
            text-align: right;
            padding-right: 10px;
        }
        .rightTab {
            width: 60%;
            text-align: left;
        }
        .inpt {
            width: 100%;
            max-width: 280px;
            height: 30px;
            padding: 5px;
            border: 1px solid #555;
            border-radius: 5px;
        }
        select.inpt {
            height: 40px;
        }
        fieldset {
            border: 1px solid cadetblue;
            border-radius: 5px;
            padding: 15px;
            margin: 0;
        }
        legend {
            font-size: 1.2em;
            font-weight: bold;
            padding: 0 5px;
        }
        fieldset p {
            margin: 0;
        }
        fieldset label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            min-height: 44px;
        }
        .columns-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .column fieldset {
            flex: 1;
        }
        textarea {
            width: 100%;
            max-width: 500px;
            height: 80px;
            border-radius: 5px;
            padding: 8px;
            margin: 0 auto 20px;
            display: block;
        }
        #cmts {
            display: block;
            width: 90%;
            margin: 0 auto 10px;
            text-align: center;
            font-size: 0.9em;
        }
        #submit {
            background-color: cadetblue;
            border-radius: 5px;
            color: white;
            font-size: 1.1em;
            height: 44px;
            width: 120px;
            border: none;
            cursor: pointer;
            display: block;
            margin: 0 auto 20px;
        }
        #submit:hover {
            background-color: white;
            color: black;
            border: 1px solid cadetblue;
        }
        #built {
            color: white;
            font-size: 1em;
            font-style: italic;
            font-family: "Poiret One", cursive;
        }
        .required-star {
            color: red;
            font-weight: bold;
            margin-right: 3px;
        }
        /* ===== WCAG 2.1 ADDITIONS ===== */
        :focus {
            outline: 3px solid #E70000;
            outline-offset: 2px;
        }
        .inpt:focus,
        select:focus,
        textarea:focus,
        button:focus {
            outline: 3px solid #E70000;
            outline-offset: 2px;
        }
        @media screen and (max-width: 833px) {
            .inpt { max-width: 100%; }
            select.inpt { width: 100%; }
        }
        @media screen and (max-width: 650px) {
            .rowTab { flex-direction: column; align-items: stretch; }
            .labels, .rightTab { width: 100%; text-align: left; padding: 5px 0; }
            .columns-wrapper { flex-direction: column; gap: 15px; }
        }
        @media screen and (max-width: 520px) {
            textarea { width: 80%; }
        }
    </style>
</head>
<body>
    <main>
        <h1 id="title">Game Subscription Service Form</h1>
        <p id="description"><em>Please kindly complete the form below, fields marked with "<span aria-hidden="true">*</span>" are required.</em></p>

        <form id="survey-form">
            <div class="rowTab">
                <div class="labels"><label for="name" id="name-label"><span class="required-star" aria-hidden="true">*</span>Name:</label></div>
                <div class="rightTab"><input type="text" id="name" name="user_name" placeholder="Enter your name..." autocomplete="name" required class="inpt"></div>
            </div>

            <div class="rowTab">
                <div class="labels"><label for="email" id="email-label"><span class="required-star" aria-hidden="true">*</span>Email:</label></div>
                <div class="rightTab"><input type="email" id="email" placeholder="email@sample.com" autocomplete="email" class="inpt" required></div>
            </div>

            <div class="rowTab">
                <div class="labels"><label for="number" id="number-label"><span class="required-star" aria-hidden="true">*</span>Phone Number:</label></div>
                <div class="rightTab"><input type="tel" id="number" placeholder="123 456 7890" pattern="[0-9\s\-]{10,}" title="Please enter a valid phone number with 10 digits" autocomplete="tel" class="inpt" required></div>
            </div>

            <div class="rowTab">
                <div class="labels"><label for="gamer-dropdown" id="dropdown-label"><span class="required-star" aria-hidden="true">*</span>Gamer Level/Experience:</label></div>
                <div class="rightTab">
                    <select id="gamer-dropdown" name="gamer_experience" class="inpt" required>
                        <option value="">-- Select your experience level --</option>
                        <option value="casual">Casual Gamer - 2 to 5 hours gametime/week</option>
                        <option value="regular">Regular - 5 to 12 hours gametime/week</option>
                        <option value="advanced">Advanced - 12 to 25 hours gametime/week</option>
                        <option value="pro">Pro - 25 hours or more gametime/week</option>
                    </select>
                </div>
            </div>

            <div class="columns-wrapper">
                <div class="column">
                    <fieldset>
                        <legend>How do you game?</legend>
                        <p>
                            <label><input type="radio" name="game-rig" value="SONY-Playstation"> SONY Playstation</label>
                            <label><input type="radio" name="game-rig" value="Microsoft-XBOX"> Microsoft XBOX</label>
                            <label><input type="radio" name="game-rig" value="Nintendo-Entertainment-Systems"> Nintendo (NES)</label>
                            <label><input type="radio" name="game-rig" value="Android/iOS"> Android/iOS</label>
                            <label><input type="radio" name="game-rig" value="Gaming-PC/Laptop"> Gaming PC/Laptop</label>
                        </p>
                    </fieldset>
                </div>
                <div class="column">
                    <fieldset>
                        <legend>What do you play?</legend>
                        <p>
                            <label><input type="checkbox" name="game-genre" value="Action"> Action</label>
                            <label><input type="checkbox" name="game-genre" value="Action/Adventure"> Action/Adventure</label>
                            <label><input type="checkbox" name="game-genre" value="Adventure"> Adventure</label>
                            <label><input type="checkbox" name="game-genre" value="Role-playing"> Role-playing</label>
                            <label><input type="checkbox" name="game-genre" value="Simulation"> Simulation</label>
                            <label><input type="checkbox" name="game-genre" value="Strategy"> Strategy</label>
                            <label><input type="checkbox" name="game-genre" value="Sports"> Sports</label>
                        </p>
                    </fieldset>
                </div>
            </div>

            <label for="comments" id="cmts">We'd love to hear from you, please kindly provide any comments or suggestions:</label>
            <textarea id="comments" placeholder="Enter your comments here"></textarea>

            <button type="submit" id="submit">Submit</button>
        </form>
    </main>
    <footer><p id="built">Site built by Marcus Lising for educational purposes (freeCodeCamp)</p></footer>
</body>
</html>
